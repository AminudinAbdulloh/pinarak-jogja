    <div class="contact-container">
        <h1>Contact</h1>
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3953.0571051762386!2d110.37196727455385!3d-7.78377047723449!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e7a583276eb8ccd%3A0x732af38c7fe6b63c!2sDinas%20Pariwisata%20Kota%20Yogyakarta!5e0!3m2!1sid!2sid!4v1747403238370!5m2!1sid!2sid"
            width="1500" height="450" style="border:0;" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>

        <div class="contact-section">
            <div class="contact-info contact">
                <div class="location">
                    <div class="location-icon contact-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z" fill="#000000"/>
                        </svg>                          
                    </div>
                    <div class="location-detail">
                        <h2>Address</h2>
                        <p>Jl. Suroto No.11, Kotabaru, Kec. Gondokusuman, Kota Yogyakarta, Daerah Istimewa Yogyakarta 55224</p>
                    </div>
                </div>
                <div class="phone">
                    <div class="phone-icon contact-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M6.62 10.79C8.06 13.62 10.38 15.94 13.21 17.38L15.27 15.32C15.56 15.03 15.97 14.92 16.34 15.03C17.45 15.36 18.64 15.53 19.88 15.53C20.5 15.53 21 16.03 21 16.65V20.5C21 21.05 20.55 21.5 20 21.5C10.34 21.5 2.5 13.66 2.5 4C2.5 3.45 2.95 3 3.5 3H7.35C7.97 3 8.47 3.5 8.47 4.12C8.47 5.36 8.64 6.55 8.97 7.66C9.08 8.03 8.97 8.44 8.68 8.73L6.62 10.79Z"
                                fill="#000000"/>
                        </svg>
                    </div>
                    <div class="phone-detail">
                        <h2>Call Us</h2>
                        <p>+1 5589 55488 55</p>
                    </div>
                </div>
                <div class="email">
                    <div class="email-icon contact-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 4H4C2.9 4 2 4.9 2 6V18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 6V6.01L12 11L4 6.01V6H20ZM4 18V8L12 13L20 8V18H4Z" fill="#000000"/>
                        </svg>
                    </div>
                    <div class="email-detail">
                        <h2>Email Us</h2>
                        <p>info@example.com</p>
                    </div>
                </div>
            </div>

            <div class="contact-form contact">
                <form>
                    <div class="form-row">
                        <input type="text" placeholder="Your Name" required>
                        <input type="email" placeholder="Your Email" required>
                    </div>
                    <input type="text" placeholder="Subject" required>
                    <textarea placeholder="Message" required></textarea>
                </form>
            </div>
        </div>
    </div>
